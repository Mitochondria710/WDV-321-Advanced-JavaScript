<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<script>
//Use the createElement( ) technique to dynamically create and add the following elements on a page:

// A drop down list with three options including a default option.

// A set of radio buttons with corresponding labels and value attributes. Make sure they behave as a group, i.e. only one can be selected within the group.

// A formatted div element with content.

document.addEventListener("DOMContentLoaded", () => {
    const cheeses = ["Cheddar", "Pepper Jack", "Mozzarella"];
    const apples = ["Red Delicious", "Granny Smith", "Fuji"];
    const content = document.getElementById("content");
    const sampleForm = document.getElementById("sampleForm");

    const div = document.createElement("div");
    div.textContent = "This div was made with JavaScript :)";
    content.appendChild(div);

    const cheeseSelect = document.createElement("select");
    cheeseSelect.setAttribute("id", "cheeseSelect");
    sampleForm.appendChild(cheeseSelect);

    const defaultOption = document.createElement('option');
    defaultOption.text = 'Select One';
    defaultOption.value = '';
    cheeseSelect.appendChild(defaultOption);

    cheeses.forEach(cheese => {
        const option = document.createElement('option');
        option.text = cheese;
        option.value = cheese.toLowerCase();
        cheeseSelect.appendChild(option);
    });

    apples.forEach(apple => {
        const radio = document.createElement('input');
        radio.setAttribute("type", "radio");
        radio.setAttribute("name", "appleTypes")
        radio.value = apple.toLowerCase();
        sampleForm.appendChild(radio);
        const label = document.createElement('label');
        label.setAttribute("for", apple);
        label.textContent = apple;
        sampleForm.appendChild(label);
    })
})
</script>
</head>
<body>
    <p id="content"></p>
    <form id="sampleForm">

    </form>
</body>
</html>
